<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
        <title>AEB & LDW System</title>
            <script async src="https://docs.opencv.org/4.5.2/opencv.js"></script>
                <style>
                        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
                                .hud-container { position: relative; width: 640px; height: 480px; margin: 20px auto; border: 2px solid #333; }
                                        canvas { position: absolute; top: 0; left: 0; }
                                                #emergency-alert {
                                                            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                                                                        background: rgba(255, 0, 0, 0.8); color: white; padding: 20px;
                                                                                    font-size: 40px; font-weight: bold; display: none; z-index: 10;
                                                                                                border: 5px solid white; border-radius: 10px;
                                                                                                        }
                                                                                                                .ui-panel { margin-top: 10px; font-size: 14px; }
                                                                                                                    </style>
                                                                                                                    </head>
                                                                                                                    <body>

                                                                                                                        <h2>ADVANCED DRIVER ASSIST SYSTEM (ADAS)</h2>
                                                                                                                            
                                                                                                                                <div class="hud-container">
                                                                                                                                        <canvas id="canvasOutput"></canvas>
                                                                                                                                                <div id="emergency-alert">⚠️ BRAKE ⚠️</div>
                                                                                                                                                    </div>

                                                                                                                                                        <div class="ui-panel">
                                                                                                                                                                <button id="startBtn" disabled>SYSTEM START</button>
                                                                                                                                                                        <p>Status: <span id="sys-status">Initializing OpenCV...</span></p>
                                                                                                                                                                            </div>

                                                                                                                                                                                <video id="videoInput" width="640" height="480" style="display:none;"></video>

                                                                                                                                                                                <script>
                                                                                                                                                                                let video = document.getElementById('videoInput');
                                                                                                                                                                                let startBtn = document.getElementById('startBtn');
                                                                                                                                                                                let alertBox = document.getElementById('emergency-alert');
                                                                                                                                                                                let statusText = document.getElementById('sys-status');

                                                                                                                                                                                // 音声アラート
                                                                                                                                                                                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                function playBrakeSound() {
                                                                                                                                                                                    const osc = audioCtx.createOscillator();
                                                                                                                                                                                        osc.type = 'square';
                                                                                                                                                                                            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                                                                                                                                                                                                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                                                                                                                                                                                                    const gain = audioCtx.createGain();
                                                                                                                                                                                                        gain.gain.value = 0.2;
                                                                                                                                                                                                            osc.connect(gain);
                                                                                                                                                                                                                gain.connect(audioCtx.destination);
                                                                                                                                                                                                                    osc.start();
                                                                                                                                                                                                                        osc.stop(audioCtx.currentTime + 0.5);
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                        function onOpenCvReady() {
                                                                                                                                                                                                                            statusText.innerText = "READY";
                                                                                                                                                                                                                                startBtn.disabled = false;
                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                if (typeof cv !== 'undefined') onOpenCvReady();
                                                                                                                                                                                                                                else window.onload = () => { if(typeof cv !== 'undefined') onOpenCvReady(); };

                                                                                                                                                                                                                                startBtn.addEventListener('click', () => {
                                                                                                                                                                                                                                    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                                                                                                                                                                                                                                        .then(stream => {
                                                                                                                                                                                                                                                video.srcObject = stream;
                                                                                                                                                                                                                                                        video.play();
                                                                                                                                                                                                                                                                if (audioCtx.state === 'suspended') audioCtx.resume();
                                                                                                                                                                                                                                                                        processVideo();
                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                            function processVideo() {
                                                                                                                                                                                                                                                                                let src = new cv.Mat(480, 640, cv.CV_8UC4);
                                                                                                                                                                                                                                                                                    let gray = new cv.Mat();
                                                                                                                                                                                                                                                                                        let prevGray = new cv.Mat();
                                                                                                                                                                                                                                                                                            let cap = new cv.VideoCapture(video);

                                                                                                                                                                                                                                                                                                function loop() {
                                                                                                                                                                                                                                                                                                        cap.read(src);
                                                                                                                                                                                                                                                                                                                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                                                                                                                                                                                                                                                                                                                        // --- 1. 自動ブレーキ（AEB）ロジック ---
                                                                                                                                                                                                                                                                                                                                // 画面中央の領域を監視
                                                                                                                                                                                                                                                                                                                                        let centerRect = new cv.Rect(220, 140, 200, 200);
                                                                                                                                                                                                                                                                                                                                                let roi = gray.roi(centerRect);
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                // 前フレームとの差分を計算（動きの激しさを検知）
                                                                                                                                                                                                                                                                                                                                                                        if (!prevGray.empty()) {
                                                                                                                                                                                                                                                                                                                                                                                    let diff = new cv.Mat();
                                                                                                                                                                                                                                                                                                                                                                                                cv.absdiff(roi, prevGray, diff);
                                                                                                                                                                                                                                                                                                                                                                                                            let threshold = new cv.Mat();
                                                                                                                                                                                                                                                                                                                                                                                                                        cv.threshold(diff, threshold, 30, 255, cv.THRESH_BINARY);
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                // 白いピクセル（動体）の数をカウント
                                                                                                                                                                                                                                                                                                                                                                                                                                                            let movement = cv.countNonZero(threshold);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 「急激に大きな物体が中央に来た」＝衝突の危険
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (movement > 15000) { // 閾値は環境に合わせて調整
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alertBox.style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                playBrakeSound();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // 画面を赤くフラッシュ
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cv.rectangle(src, new cv.Point(0,0), new cv.Point(640,480), [255,0,0,100], -1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alertBox.style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    diff.delete(); threshold.delete();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // 次のフレームのために保存
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    gray.copyTo(prevGray);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // --- 2. 視覚エフェクト（HUD風） ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cv.rectangle(src, new cv.Point(220, 140), new cv.Point(420, 340), [0, 255, 0, 255], 1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cv.line(src, new cv.Point(320, 0), new cv.Point(320, 480), [0, 255, 0, 50], 1);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cv.imshow('canvasOutput', src);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            roi.delete();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(loop, 33);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            loop();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
