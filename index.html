<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dictionary - Brain Complete</title>
    <style>
        :root {
            --brain-blue: #005bac;
            --screen-bg: #ffffff;
            --body-bg: #c0c5ce;
            --accent-orange: #f39800;
            --text-size: 18px;
        }
        body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; background-color: var(--body-bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .device { width: 100%; max-width: 1100px; background: #e5e7eb; border-radius: 15px; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: 1px solid #888; }
        .screen { background: var(--screen-bg); border-radius: 4px; border: 3px solid #333; display: flex; flex-direction: column; min-height: 700px; position: relative; overflow: hidden; }

        /* タブ */
        .dict-tabs { display: flex; flex-wrap: wrap; background: #222; gap: 1px; padding: 2px 2px 0; }
        .tab { flex: 1; min-width: 80px; padding: 6px 2px; font-size: 11px; color: #ccc; cursor: pointer; text-align: center; background: #444; border-radius: 3px 3px 0 0; }
        .tab.active { background: var(--screen-bg); color: var(--brain-blue); font-weight: bold; }

        /* ツールバー */
        .tool-bar { background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 5px 15px; display: flex; gap: 15px; align-items: center; font-size: 12px; }
        .tool-btn { cursor: pointer; padding: 2px 8px; border: 1px solid #bbb; background: white; border-radius: 3px; }

        /* 検索バー */
        .header-bar { background: var(--brain-blue); padding: 12px; display: flex; gap: 10px; }
        .search-container { flex: 1; display: flex; background: white; border-radius: 4px; overflow: hidden; }
        input { flex: 1; border: none; padding: 10px; outline: none; font-size: 16px; }
        .search-btn { background: var(--accent-orange); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }

        .main-view { display: flex; flex: 1; overflow: hidden; }
        .side-index { width: 200px; background: #edf2f7; border-right: 1px solid #ccc; overflow-y: auto; }
        .history-item { padding: 12px; border-bottom: 1px solid #d1d9e0; font-size: 13px; cursor: pointer; background: #edf2f7; }
        .history-item:hover { background: white; }

        /* コンテンツ表示エリア（ここを強化） */
        .content-area { flex: 1; padding: 30px; overflow-y: auto; background: white; position: relative; }
        .res-title { font-size: 2em; margin: 0 0 10px; color: var(--brain-blue); border-bottom: 3px solid var(--brain-blue); }
        .wiki-content { font-size: var(--text-size); line-height: 1.8; color: #111; }
        
        /* 画像のスタイル */
        .wiki-content img { max-width: 100%; height: auto; border: 1px solid #ddd; margin: 10px 0; border-radius: 4px; display: block; }
        
        /* セクションの見出し */
        .wiki-content h2 { font-size: 1.4em; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid var(--brain-blue); margin-top: 30px; }
        .wiki-content h3 { font-size: 1.2em; border-bottom: 1px solid #eee; margin-top: 20px; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; font-weight: bold; color: var(--brain-blue); background: rgba(255,255,255,0.8); padding: 20px; border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>

<div class="device">
    <div class="screen">
        <div class="dict-tabs">
            <div class="tab active" onclick="changeDict('百科', this)">百科事典</div>
            <div class="tab" onclick="changeDict('国語', this)">国語辞典</div>
            <div class="tab" onclick="changeDict('類語', this)">類語辞典</div>
            <div class="tab" onclick="changeDict('英語', this)">英語辞典</div>
            <div class="tab" onclick="changeDict('古語', this)">古語辞典</div>
            <div class="tab" onclick="changeDict('ことわざ', this)">ことわざ</div>
            <div class="tab" onclick="changeDict('理科', this)">理科辞典</div>
            <div class="tab" onclick="changeDict('社会', this)">社会辞典</div>
            <div class="tab" onclick="changeDict('算数', this)">算数辞典</div>
        </div>

        <div class="tool-bar">
            <span>文字サイズ:</span>
            <span class="tool-btn" onclick="resizeText('15px')">小</span>
            <span class="tool-btn" onclick="resizeText('19px')">中</span>
            <span class="tool-btn" onclick="resizeText('26px')">大</span>
            <span id="speakControl" style="margin-left: 20px; display:none;">
                <button class="tool-btn" onclick="speak()">🔊 英語を聴く</button>
            </span>
        </div>

        <div class="header-bar">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="検索ワードを入力...">
                <button class="search-btn" onclick="executeSearch()">検索/決定</button>
            </div>
        </div>

        <div class="main-view">
            <aside class="side-index">
                <div style="background:#ccd5e0; padding:5px; font-size:11px; text-align:center;">最近の履歴</div>
                <div id="historyList"></div>
            </aside>

            <main class="content-area" id="mainDisplay">
                <div id="loader">辞典を引いています...</div>
                <div id="resultBox">
                    <h2 id="resTitle" class="res-title">電子辞書 Brain Pro</h2>
                    <div id="resBody" class="wiki-content">
                        調べたい言葉を入力して「検索」を押してください。<br>
                        Wikipediaの情報を、そのままこの画面に映し出します。
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    let currentMode = '百科';
    let history = JSON.parse(localStorage.getItem('brain_history')) || [];

    function changeDict(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('speakControl').style.display = (mode === '英語') ? 'inline-block' : 'none';
    }

    function resizeText(size) {
        document.documentElement.style.setProperty('--text-size', size);
    }

    async function executeSearch() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        document.getElementById('loader').style.display = 'block';
        const resBody = document.getElementById('resBody');
        resBody.innerHTML = "";

        if (currentMode === '英語') {
            await searchEnglish(query);
        } else {
            await searchWikipediaFull(query);
        }

        document.getElementById('loader').style.display = 'none';
        addHistory(query);
        document.getElementById('mainDisplay').scrollTop = 0;
    }

    // Wikipediaの「ページ内容そのまま（テキスト＆画像）」を取得する関数
    async function searchWikipediaFull(query) {
        // action=parse を使うことで、HTML形式で中身をそのまま引っ張れる
        const url = `https://ja.wikipedia.org/w/api.php?action=parse&format=json&page=${encodeURIComponent(query)}&prop=text|images|displaytitle&redirects=1&origin=*`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.error) {
                document.getElementById('resTitle').innerText = "未登録";
                document.getElementById('resBody').innerHTML = "お探しの言葉は見つかりませんでした。別の言葉をお試しください。";
            } else {
                document.getElementById('resTitle').innerText = data.parse.title;
                
                // WikipediaのHTMLを加工して表示
                let rawHtml = data.parse.text["*"];
                
                // 不要なリンクやメタ情報を削除（簡易クリーニング）
                let cleanHtml = rawHtml.replace(/href="\/wiki\//g, 'href="javascript:void(0)" onclick="directSearch(this.innerText)" data-word="');
                
                // 画像URLを完全なパスに修正
                cleanHtml = cleanHtml.replace(/\/\/upload.wikimedia.org/g, 'https://upload.wikimedia.org');

                document.getElementById('resBody').innerHTML = cleanHtml;
            }
        } catch (e) { 
            document.getElementById('resBody').innerHTML = "データの取得に失敗しました。";
        }
    }

    async function searchEnglish(word) {
        const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.title) {
                document.getElementById('resTitle').innerText = "Not Found";
                document.getElementById('resBody').innerText = "Word not found.";
            } else {
                const entry = data[0];
                document.getElementById('resTitle').innerText = entry.word;
                let html = `<h3>Phonetics: ${entry.phonetic || ''}</h3>`;
                entry.meanings.forEach(m => {
                    html += `<h4>[${m.partOfSpeech}]</h4><ul>`;
                    m.definitions.slice(0,3).forEach(d => {
                        html += `<li>${d.definition}</li>`;
                    });
                    html += `</ul>`;
                });
                document.getElementById('resBody').innerHTML = html;
            }
        } catch (e) { alert("API Error"); }
    }

    function directSearch(word) {
        document.getElementById('searchInput').value = word;
        executeSearch();
    }

    function speak() {
        const text = document.getElementById('resTitle').innerText;
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        speechSynthesis.speak(uttr);
    }

    function addHistory(word) {
        if (!history.includes(word)) {
            history.unshift(word);
            history = history.slice(0, 15);
            localStorage.setItem('brain_history', JSON.stringify(history));
            updateHistoryUI();
        }
    }

    function updateHistoryUI() {
        document.getElementById('historyList').innerHTML = history.map(h => 
            `<div class="history-item" onclick="directSearch('${h}')">${h}</div>`
        ).join('');
    }

    window.onload = updateHistoryUI;
</script>

</body>
</html>
