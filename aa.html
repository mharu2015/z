<!DOCTYPE html>
<html lang="ja">
    <head>
            <meta charset="UTF-8">
                <title>AI Driving Simulator - Tesla Style</title>
                    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
                        <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
                            <style>
                                        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
                                                #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
                                                        canvas { border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
                                                                #video { display: none; } /* 元の映像は隠す */
                                                                        #hud { position: absolute; top: 20px; text-align: center; }
                                                                                .status { font-size: 24px; font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
                                                                                        .brake { background: red; display: none; }
                                                                                                .lane-warning { color: orange; display: none; }
                                                                                                        .info { position: absolute; bottom: 20px; left: 20px; color: #888; }
                            </style>
                        </head>
                        <body>

                            <div id="container">
                                    <div id="hud">
                                                <div id="brake-alert" class="status brake">EMERGENCY BRAKE</div>
                                                        <div id="lane-alert" class="status lane-warning">LANE DEPARTURE WARNING</div>
                                    </div>
                                        <canvas id="teslaCanvas"></canvas>
                                            <video id="video" autoplay playsinline muted></video>
                                                <div class="info">AI: Coco-SSD Model / Web Camera Interface</div>
                                </div>

                                <script>
                                        const video = document.getElementById('video');
                                            const canvas = document.getElementById('teslaCanvas');
                                                const ctx = canvas.getContext('2d');
                                                    const brakeAlert = document.getElementById('brake-alert');
                                                        const laneAlert = document.getElementById('lane-alert');

                                                            let model;

                                                                // カメラのセットアップ
                                                                    async function setupCamera() {
                                                                                const stream = await navigator.mediaDevices.getUserMedia({
                                                                                                video: { width: 640, height: 480 },
                                                                                                            audio: false
                                                                                });
                                                                                        video.srcObject = stream;
                                                                                                return new Promise((resolve) => {
                                                                                                                video.onloadedmetadata = () => resolve(video);
                                                                                                });
                                                                                            }

                                                                                                // メインループ
                                                                                                    async function detect() {
                                                                                                                const predictions = await model.detect(video);
                                                                                                                        drawScene(predictions);
                                                                                                                                requestAnimationFrame(detect);
                                                                                                    }

                                                                                                        function drawScene(predictions) {
                                                                                                                    // キャンバスのリセット
                                                                                                                            ctx.fillStyle = "#1a1a1a";
                                                                                                                                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                                                                                                                                            // 道路の描画 (テスラ風のパースペクティブ)
                                                                                                                                                    ctx.strokeStyle = "#444";
                                                                                                                                                            ctx.lineWidth = 2;
                                                                                                                                                                    ctx.beginPath();
                                                                                                                                                                            ctx.moveTo(canvas.width/2 - 50, 200); ctx.lineTo(50, canvas.height);
                                                                                                                                                                                    ctx.moveTo(canvas.width/2 + 50, 200); ctx.lineTo(canvas.width - 50, canvas.height);
                                                                                                                                                                                            ctx.stroke();

                                                                                                                                                                                                    let isBraking = false;
                                                                                                                                                                                                            let laneDeparture = false;

                                                                                                                                                                                                                    predictions.forEach(prediction => {
                                                                                                                                                                                                                                    const [x, y, width, height] = prediction.bbox;
                                                                                                                                                                                                                                                const centerX = x + width / 2;
                                                                                                                                                                                                                                                            const centerY = y + height / 2;

                                                                                                                                                                                                                                                                        // 物体に応じた色設定
                                                                                                                                                                                                                                                                                    let color = "#00ffff"; // 車は青
                                                                                                                                                                                                                                                                                                if (prediction.class === 'person') color = "#ffffff"; // 人は白
                                                                                                                                                                                                                                                                                                            if (prediction.class === 'traffic light') color = "#ffff00"; // 信号は黄

                                                                                                                                                                                                                                                                                                                        // テスラ風の「箱」を描画
                                                                                                                                                                                                                                                                                                                                    ctx.strokeStyle = color;
                                                                                                                                                                                                                                                                                                                                                ctx.lineWidth = 3;
                                                                                                                                                                                                                                                                                                                                                            // 遠近感を出すための座標変換（簡易）
                                                                                                                                                                                                                                                                                                                                                                        const drawX = (x / video.videoWidth) * canvas.width;
                                                                                                                                                                                                                                                                                                                                                                                    const drawY = (y / video.videoHeight) * canvas.height;
                                                                                                                                                                                                                                                                                                                                                                                                const drawW = (width / video.videoWidth) * canvas.width;
                                                                                                                                                                                                                                                                                                                                                                                                            const drawH = (height / video.videoHeight) * canvas.height;

                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.strokeRect(drawX, drawY, drawW, drawH);
                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.fillStyle = color;
                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.font = "12px Arial";
                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillText(prediction.class.toUpperCase(), drawX, drawY - 5);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // --- 自動ブレーキ判定 ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 前方の中心付近に大きな物体（近い物体）がある場合
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (prediction.class === 'person' || prediction.class === 'car') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (drawW > 150 && drawX > 100 && drawX < 500) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            isBraking = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // --- 車線はみ出し判定（簡易） ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // 画面の端に物体が寄りすぎているか
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (drawX < 80 || (drawX + drawW) > 560) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        laneDeparture = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // UIの更新
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                brakeAlert.style.display = isBraking ? 'block' : 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        laneAlert.style.display = laneDeparture ? 'block' : 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function init() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            canvas.width = 640;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    canvas.height = 480;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log("モデル読み込み中...");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    model = await cocoSsd.load();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log("モデル完了");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    await setupCamera();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            detect();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    init();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                    })
                                                                                                        }
                                                                                                    }
                                                                                                })
                                                                                })
                                                                    }
